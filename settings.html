<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyTrack — Settings</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.settings-layout{display:flex;gap:20px;align-items:flex-start}
@media (max-width:800px){.settings-layout{flex-direction:column}}
.settings-tabs{display:flex;flex-direction:column;gap:2px;width:200px;flex-shrink:0;background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:8px}
@media (max-width:800px){.settings-tabs{width:100%;flex-direction:row;overflow-x:auto}}
.settings-tab{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;white-space:nowrap}
.settings-tab:hover{background:var(--surface-1)}
.settings-tab.active{background:#E8EFF6;color:var(--navy)}
.settings-panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.panel{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:18px}
.panel h2{font-size:15px;color:var(--navy);margin:0 0 3px}
.panel-sub{font-size:12px;color:var(--text-secondary);margin-bottom:16px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:500;color:var(--text-secondary)}
.form-group input,.form-group select{padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:6px;font-size:13px;outline:none;background:var(--surface-2);font-family:var(--font-sans)}
.form-group input:focus,.form-group select:focus{border-color:var(--navy)}

.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.logo-box{width:56px;height:56px;border-radius:12px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.logo-btn{padding:7px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-secondary);cursor:pointer;background:var(--surface-2)}
.logo-btn:hover{background:var(--surface-1)}

.freq-table{width:100%;border-collapse:collapse}
.freq-table th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--text-secondary);padding:8px 6px;border-bottom:0.5px solid var(--border)}
.freq-table td{padding:8px 6px;font-size:13px;border-bottom:0.5px solid var(--border)}
.freq-table select{padding:6px 8px;border:0.5px solid var(--border-strong);border-radius:6px;font-size:12px}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-row-label{display:flex;flex-direction:column;gap:2px}
.toggle-row-title{font-size:13px;font-weight:500}
.toggle-row-desc{font-size:11px;color:var(--text-secondary)}
.toggle{position:relative;width:38px;height:22px;border-radius:20px;background:var(--border-strong);cursor:pointer;flex-shrink:0;transition:background .15s}
.toggle.on{background:var(--ok)}
.toggle-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s}
.toggle.on .toggle-knob{left:18px}

.role-perm{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border)}
.role-perm:last-child{border-bottom:none}
.role-perm-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.role-perm-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface-1);color:var(--text-secondary)}

.danger-zone{border:1px solid var(--bad);background:#FFF5F5}
.danger-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid #F5C6C6}
.danger-row:last-child{border-bottom:none}
.danger-row-title{font-size:13px;font-weight:600;color:var(--bad)}
.danger-row-desc{font-size:11px;color:var(--text-secondary);margin-top:2px}
.btn-danger{padding:7px 14px;border-radius:8px;border:1px solid var(--bad);background:#fff;color:var(--bad);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-danger:hover{background:var(--bad-bg)}

.save-bar{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.btn-save{padding:9px 18px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-save:hover{background:var(--navy-dark)}
.saved-note{font-size:12px;color:var(--ok);display:flex;align-items:center;gap:5px;align-self:center;margin-right:auto}
</style>
</head>
<body>

<div id="page-content">
  <div id="settingsRoot"></div>
</div>

<script>
const TABS = [
  { id:"org", label:"Organization", icon:"ti-building-skyscraper" },
  { id:"inspections", label:"Inspection defaults", icon:"ti-clipboard-check" },
  { id:"notifications", label:"Notifications", icon:"ti-bell" },
  { id:"roles", label:"Roles & permissions", icon:"ti-lock" },
  { id:"danger", label:"Danger zone", icon:"ti-alert-triangle" },
];

let activeTab = "org";
let saved = false;

let org = { name:"UC Santa Cruz", industry:"Higher Education", timezone:"Pacific Time (US & Canada)", primaryContact:"safety@ucsc.edu" };

let freqDefaults = {
  "AED":"Monthly", "Fire Extinguisher":"Monthly", "First Aid Kit":"Quarterly",
  "Evacuation Chair":"Monthly", "Eyewash Station":"Weekly",
};

let notifPrefs = {
  emailReminders: true,
  overdueEscalation: true,
  weeklyDigest: true,
  smsAlerts: false,
};

function markSaved(){
  saved = true;
  renderMain();
  setTimeout(()=>{ saved=false; renderMain(); }, 2500);
}
function toggleNotif(key){
  notifPrefs[key] = !notifPrefs[key];
  renderMain();
}
function setFreq(type, val){
  freqDefaults[type] = val;
}

function renderMain(){
  document.getElementById("settingsRoot").innerHTML = `
    <div class="settings-layout">
      <div class="settings-tabs">
        ${TABS.map(t=>`<div class="settings-tab ${activeTab===t.id?'active':''}" onclick="activeTab='${t.id}';renderMain()"><i class="ti ${t.icon}"></i> ${t.label}</div>`).join('')}
      </div>
      <div class="settings-panel">
        ${renderPanel()}
      </div>
    </div>
  `;
}

function renderPanel(){
  if(activeTab==="org") return `
    <div class="panel">
      <h2>Organization profile</h2>
      <div class="panel-sub">Basic information about your organization, used across reports and the client-facing demo.</div>
      <div class="logo-row">
        <div class="logo-box">${org.name.split(" ").map(w=>w[0]).slice(0,2).join("")}</div>
        <div class="logo-btn" onclick="alert('Logo upload would open a file picker here.')">Upload logo</div>
      </div>
      <div class="form-grid">
        <div class="form-group full"><div class="form-label">Organization name</div><input id="f_orgname" value="${org.name}"/></div>
        <div class="form-group"><div class="form-label">Industry</div>
          <select id="f_industry">
            ${["Higher Education","Healthcare","Corporate Campus","K-12 Schools","Government"].map(i=>`<option ${org.industry===i?'selected':''}>${i}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><div class="form-label">Timezone</div>
          <select id="f_timezone">
            ${["Pacific Time (US & Canada)","Mountain Time (US & Canada)","Central Time (US & Canada)","Eastern Time (US & Canada)"].map(tz=>`<option ${org.timezone===tz?'selected':''}>${tz}</option>`).join('')}
          </select>
        </div>
        <div class="form-group full"><div class="form-label">Primary contact email</div><input id="f_contact" value="${org.primaryContact}"/></div>
      </div>
    </div>
    ${saveBar("saveOrg")}
  `;

  if(activeTab==="inspections") return `
    <div class="panel">
      <h2>Default inspection frequency</h2>
      <div class="panel-sub">Applied automatically when new equipment of each type is added. Can still be overridden per unit in Equipment.</div>
      <table class="freq-table">
        <thead><tr><th>Equipment type</th><th>Default frequency</th></tr></thead>
        <tbody>
          ${Object.keys(freqDefaults).map(type=>`
            <tr>
              <td>${type}</td>
              <td>
                <select onchange="setFreq('${type}', this.value)">
                  ${["Weekly","Monthly","Quarterly","Annually"].map(f=>`<option ${freqDefaults[type]===f?'selected':''}>${f}</option>`).join('')}
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    ${saveBar("saveFreq")}
  `;

  if(activeTab==="notifications") return `
    <div class="panel">
      <h2>Notification preferences</h2>
      <div class="panel-sub">Controls what gets emailed to coordinators and inspectors, organization-wide.</div>
      <div class="toggle-row">
        <div class="toggle-row-label">
          <div class="toggle-row-title">Inspection due reminders</div>
          <div class="toggle-row-desc">Email sent 2 days before an assigned inspection is due.</div>
        </div>
        <div class="toggle ${notifPrefs.emailReminders?'on':''}" onclick="toggleNotif('emailReminders')"><div class="toggle-knob"></div></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-row-label">
          <div class="toggle-row-title">Overdue escalation</div>
          <div class="toggle-row-desc">Notify the site coordinator if an inspection is more than 3 days overdue.</div>
        </div>
        <div class="toggle ${notifPrefs.overdueEscalation?'on':''}" onclick="toggleNotif('overdueEscalation')"><div class="toggle-knob"></div></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-row-label">
          <div class="toggle-row-title">Weekly compliance digest</div>
          <div class="toggle-row-desc">Summary email every Monday morning with compliance rate and open findings.</div>
        </div>
        <div class="toggle ${notifPrefs.weeklyDigest?'on':''}" onclick="toggleNotif('weeklyDigest')"><div class="toggle-knob"></div></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-row-label">
          <div class="toggle-row-title">SMS alerts for high-priority findings</div>
          <div class="toggle-row-desc">Requires phone numbers on file. Carrier charges may apply.</div>
        </div>
        <div class="toggle ${notifPrefs.smsAlerts?'on':''}" onclick="toggleNotif('smsAlerts')"><div class="toggle-knob"></div></div>
      </div>
    </div>
    ${saveBar("saveNotif")}
  `;

  if(activeTab==="roles") return `
    <div class="panel">
      <h2>Roles & permissions</h2>
      <div class="panel-sub">SafetyTrack uses two fixed roles. Manage individual accounts in the Accounts screen.</div>
      <div class="role-perm">
        <div class="role-perm-name"><i class="ti ti-shield-check" style="color:var(--navy)"></i> Coordinator</div>
        <div class="role-perm-badge">Full access — all sites, equipment, accounts</div>
      </div>
      <div class="role-perm">
        <div class="role-perm-name"><i class="ti ti-user-check" style="color:var(--ok)"></i> Inspector</div>
        <div class="role-perm-badge">Log inspections on assigned sites only</div>
      </div>
      <p style="font-size:11px;color:var(--text-muted);margin-top:14px">Custom roles and granular permissions are planned for a future release.</p>
    </div>
  `;

  if(activeTab==="danger") return `
    <div class="panel danger-zone">
      <h2 style="color:var(--bad)">Danger zone</h2>
      <div class="panel-sub">These actions are permanent and cannot be undone.</div>
      <div class="danger-row">
        <div>
          <div class="danger-row-title">Reset demo data</div>
          <div class="danger-row-desc">Restores all sample UCSC data to its original state.</div>
        </div>
        <div class="btn-danger" onclick="if(confirm('Reset all demo data to defaults?')) alert('Demo data reset.')">Reset data</div>
      </div>
      <div class="danger-row">
        <div>
          <div class="danger-row-title">Remove all accounts</div>
          <div class="danger-row-desc">Deletes every coordinator and inspector account except your own.</div>
        </div>
        <div class="btn-danger" onclick="if(confirm('Remove all accounts except your own? This cannot be undone.')) alert('Accounts removed.')">Remove accounts</div>
      </div>
      <div class="danger-row">
        <div>
          <div class="danger-row-title">Delete organization</div>
          <div class="danger-row-desc">Permanently deletes this organization and all associated data.</div>
        </div>
        <div class="btn-danger" onclick="if(confirm('This will permanently delete this organization. Are you absolutely sure?')) alert('Organization deletion would be processed here.')">Delete organization</div>
      </div>
    </div>
  `;

  return "";
}

function saveBar(fnName){
  return `
    <div class="save-bar">
      ${saved ? `<div class="saved-note"><i class="ti ti-check"></i> Saved</div>` : ''}
      <button class="btn-save" onclick="markSaved()">Save changes</button>
    </div>
  `;
}

document.addEventListener("DOMContentLoaded", renderMain);
</script>

<script src="nav.js"></script>
</body>
</html>
