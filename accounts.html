<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyTrack — Accounts</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.acc-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.rtabs{display:flex;gap:6px;flex-wrap:wrap}
.rtab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);color:var(--text-secondary);background:var(--surface-2);white-space:nowrap;transition:all .13s}
.rtab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.rtab.coord.active{background:var(--navy)}
.rtab.insp.active{background:var(--ok)}
.invite-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-left:auto;white-space:nowrap}
.invite-btn:hover{background:var(--navy-dark)}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
@media (max-width:700px){.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
.stat{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-lbl{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:var(--navy)}
.stat-val.coord{color:var(--navy)}
.stat-val.insp{color:var(--ok)}
.stat-val.pending{color:var(--warn)}

.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.user-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:14px;transition:opacity .15s}
.user-card.inactive{opacity:0.5}
.uc-top{display:flex;gap:10px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.uc-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.uc-title{font-size:11px;color:var(--text-secondary)}
.uc-inactive-tag{font-size:10px;color:var(--text-muted);margin-left:6px;font-weight:400}
.role-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:8px}
.role-badge.coord{background:#E8EFF6;color:var(--navy)}
.role-badge.insp{background:var(--ok-bg);color:var(--ok)}
.role-badge.pending{background:var(--warn-bg);color:var(--warn)}
.uc-meta{font-size:12px;color:var(--text-secondary);display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.uc-meta i{width:14px;font-size:12px;margin-right:4px}
.uc-sites{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.site-chip{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-secondary)}
.uc-actions{display:flex;gap:6px;border-top:0.5px solid var(--border);padding-top:10px}
.uc-btn{flex:1;text-align:center;padding:6px 8px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary)}
.uc-btn:hover{background:var(--surface-1)}
.uc-btn.danger{color:var(--bad)}
.uc-btn.primary{color:var(--ok)}
.empty-state{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:32px;margin-bottom:8px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface-2);border-radius:14px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:0.5px solid var(--border)}
.modal-head-icon{width:32px;height:32px;border-radius:8px;background:#E8EFF6;color:var(--navy);display:flex;align-items:center;justify-content:center}
.modal-title{font-size:15px;font-weight:600;color:var(--navy);flex:1}
.modal-close{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted)}
.modal-close:hover{background:var(--surface-1)}
.modal-body{padding:16px 18px}
.invite-hint{display:flex;gap:8px;align-items:flex-start;background:var(--gold-light);color:#7a5a05;font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:500;color:var(--text-secondary)}
.form-label span{color:var(--bad);margin-left:2px}
.form-group input{padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:6px;font-size:13px;outline:none}
.form-group input:focus{border-color:var(--navy)}
.section-divider{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text-muted);margin:16px 0 8px;letter-spacing:.03em}
.role-picker{display:flex;flex-direction:column;gap:8px}
.role-card{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .13s}
.role-card.selected{border-color:var(--navy);background:#F5F8FB}
.role-card.insp.selected{border-color:var(--ok);background:#F3FAF3}
.role-card-title{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:3px}
.role-card-desc{font-size:11px;color:var(--text-secondary);line-height:1.4}
.sites-checklist{display:flex;flex-direction:column;gap:2px;max-height:160px;overflow-y:auto;border:0.5px solid var(--border);border-radius:8px;padding:6px}
.site-check-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px}
.site-check-row:hover{background:var(--surface-1)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:0.5px solid var(--border)}
.btn-cancel{padding:8px 16px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface-2);font-size:13px;font-weight:500;cursor:pointer;color:var(--text-secondary)}
.btn-save{padding:8px 16px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-save:hover{background:var(--navy-dark)}
</style>
</head>
<body>

<div id="page-content">
  <div id="acctRoot"></div>
</div>

<script>
const SITES = ["McHenry Library","Kresge Town Hall","Science Hill Bldg 3","Porter College",
  "Cowell College","Crown College","Baskin Engineering","Communications Building"];

let accounts = [
  { id:1, name:"Maria Torres", title:"Safety Coordinator", email:"mtorres@ucsc.edu", phone:"(831) 459-1122",
    role:"coord", status:"active", lastLogin:"Today, 9:14 AM", sites:[...SITES] },
  { id:2, name:"David Kim", title:"Safety Coordinator", email:"dkim@ucsc.edu", phone:"(831) 459-1187",
    role:"coord", status:"active", lastLogin:"Yesterday, 4:02 PM", sites:[...SITES] },
  { id:3, name:"Jasmine Alvarez", title:"Safety Inspector", email:"jalvarez@ucsc.edu", phone:"(831) 459-2201",
    role:"insp", status:"active", lastLogin:"Today, 8:30 AM", sites:["McHenry Library","Kresge Town Hall"] },
  { id:4, name:"Tom Nguyen", title:"Safety Inspector", email:"tnguyen@ucsc.edu", phone:"(831) 459-2255",
    role:"insp", status:"active", lastLogin:"3 days ago", sites:["Science Hill Bldg 3","Porter College","Cowell College"] },
  { id:5, name:"Rachel Ford", title:"Safety Inspector", email:"rford@ucsc.edu", phone:"(831) 459-2299",
    role:"insp", status:"inactive", lastLogin:"6 weeks ago", sites:["Crown College"] },
  { id:6, name:"Amy Johnson", title:"Safety Inspector", email:"ajohnson@ucsc.edu", phone:"",
    role:"insp", status:"pending", lastLogin:"—", sites:["Baskin Engineering"] },
  { id:7, name:"Carlos Rivera", title:"Safety Coordinator", email:"crivera@ucsc.edu", phone:"",
    role:"coord", status:"pending", lastLogin:"—", sites:[...SITES] },
];

let activeTab = "all";
let modalMode = null;      // null | 'invite' | 'edit'
let editItem = {};
let selectedSites = [];

function initials(name){
  return name.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
}
function avatarStyle(i){
  const palette = [
    {bg:"#E8EFF6",color:"#003C6C"}, {bg:"#E8F5E9",color:"#2E7D32"},
    {bg:"#FEF3D6",color:"#B45309"}, {bg:"#F3E8F6",color:"#7B1FA2"},
  ];
  return palette[i % palette.length];
}
function stats(){
  return {
    total: accounts.length,
    coord: accounts.filter(a=>a.role==="coord").length,
    insp: accounts.filter(a=>a.role==="insp").length,
    pending: accounts.filter(a=>a.status==="pending").length,
  };
}

function renderMain(){
  const s = stats();
  const rows = activeTab==="all" ? accounts : accounts.filter(a=>a.role===activeTab);

  document.getElementById("acctRoot").innerHTML = `
    <div class="acc-toolbar">
      <div class="rtabs">
        <div class="rtab ${activeTab==='all'?'active':''}" onclick="activeTab='all';renderMain()">All (${s.total})</div>
        <div class="rtab coord ${activeTab==='coord'?'active':''}" onclick="activeTab='coord';renderMain()"><i class="ti ti-shield-check"></i> Coordinator</div>
        <div class="rtab insp ${activeTab==='insp'?'active':''}" onclick="activeTab='insp';renderMain()"><i class="ti ti-user-check"></i> Inspector</div>
      </div>
      <button class="invite-btn" onclick="openInvite()"><i class="ti ti-user-plus"></i> Invite user</button>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">Total accounts</div><div class="stat-val">${s.total}</div></div>
      <div class="stat"><div class="stat-lbl">Coordinators</div><div class="stat-val coord">${s.coord}</div></div>
      <div class="stat"><div class="stat-lbl">Inspectors</div><div class="stat-val insp">${s.insp}</div></div>
      <div class="stat"><div class="stat-lbl">Pending invite</div><div class="stat-val pending">${s.pending}</div></div>
    </div>

    <div class="user-grid">
      ${rows.length===0 ? `<div class="empty-state"><i class="ti ti-user-search"></i><p>No accounts match this filter.</p></div>` :
      rows.map((u,i)=>{
        const av = avatarStyle(i);
        const isPending = u.status==="pending";
        const isInactive = u.status==="inactive";
        const shown = u.sites.slice(0,2);
        const extra = u.sites.length-2;
        return `
        <div class="user-card ${isInactive?'inactive':''}">
          <div class="uc-top">
            <div class="avatar" style="background:${av.bg};color:${av.color}">${initials(u.name)}</div>
            <div style="flex:1;min-width:0">
              <div class="uc-name">${u.name}${isInactive?'<span class="uc-inactive-tag">inactive</span>':''}</div>
              <div class="uc-title">${u.title}</div>
            </div>
          </div>
          <div class="role-badge ${isPending?'pending':u.role}">
            <i class="ti ti-${u.role==='coord'?'shield-check':'user-check'}"></i>
            ${isPending?'Pending · ':''}${u.role==='coord'?'Coordinator':'Inspector'}
          </div>
          <div class="uc-meta">
            <div><i class="ti ti-mail"></i>${u.email}</div>
            ${u.phone?`<div><i class="ti ti-phone"></i>${u.phone}</div>`:''}
            <div><i class="ti ti-clock"></i>Last login: ${u.lastLogin}</div>
          </div>
          <div class="uc-sites">
            ${shown.map(s=>`<span class="site-chip">${s}</span>`).join('')}
            ${extra>0?`<span class="site-chip">+${extra} more</span>`:''}
          </div>
          <div class="uc-actions">
            <div class="uc-btn" onclick="openEdit(${u.id})"><i class="ti ti-edit"></i> Edit</div>
            ${isPending
              ? `<div class="uc-btn primary" onclick="resendInvite(${u.id})"><i class="ti ti-mail-forward"></i> Resend invite</div>`
              : `<div class="uc-btn ${isInactive?'primary':'danger'}" onclick="toggleActive(${u.id})">
                   <i class="ti ti-${isInactive?'user-check':'user-off'}"></i> ${isInactive?'Reactivate':'Deactivate'}
                 </div>`}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div id="modalView"></div>
  `;
  renderModal();
}

function openInvite(){
  editItem = { id:null, name:"", title:"", email:"", phone:"", role:"insp" };
  selectedSites = [];
  modalMode = "invite";
  renderMain();
}
function openEdit(id){
  const u = accounts.find(a=>a.id===id);
  editItem = { ...u };
  selectedSites = [...u.sites];
  modalMode = "edit";
  renderMain();
}
function closeModal(){
  modalMode = null;
  renderMain();
}
function toggleSite(site){
  selectedSites = selectedSites.includes(site)
    ? selectedSites.filter(s=>s!==site)
    : [...selectedSites, site];
  renderModal();
}
function toggleActive(id){
  const u = accounts.find(a=>a.id===id);
  u.status = u.status==="inactive" ? "active" : "inactive";
  renderMain();
}
function resendInvite(id){
  alert("Invite email resent.");
}
function saveAccount(){
  const name = document.getElementById("f_name").value.trim();
  const email = document.getElementById("f_email").value.trim();
  if(!name || !email){ alert("Name and email are required."); return; }
  const title = document.getElementById("f_title").value.trim();
  const phone = document.getElementById("f_phone").value.trim();
  const sites = editItem.role==="coord" ? [...SITES] : selectedSites;

  if(modalMode==="edit"){
    const u = accounts.find(a=>a.id===editItem.id);
    Object.assign(u, { name, title, email, phone, role: editItem.role, sites });
  } else {
    accounts.push({
      id: Math.max(...accounts.map(a=>a.id))+1,
      name, title, email, phone, role: editItem.role,
      status:"pending", lastLogin:"—", sites,
    });
  }
  modalMode = null;
  renderMain();
}

function renderModal(){
  if(!modalMode){ 
    const mv = document.getElementById("modalView");
    if(mv) mv.innerHTML = "";
    return;
  }
  const isEdit = modalMode==="edit";
  const role = editItem.role || "insp";
  document.getElementById("modalView").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-head-icon"><i class="ti ti-user-plus"></i></div>
        <div class="modal-title">${isEdit?'Edit account':'Invite new user'}</div>
        <div class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></div>
      </div>
      <div class="modal-body">
        ${!isEdit?`<div class="invite-hint"><i class="ti ti-mail"></i>An email invite will be sent with a link to set up their password and access SafetyTrack.</div>`:''}
        <div class="form-grid">
          <div class="form-group"><div class="form-label">First and last name<span>*</span></div><input id="f_name" value="${editItem.name||''}" placeholder="Maria Torres"/></div>
          <div class="form-group"><div class="form-label">Job title</div><input id="f_title" value="${editItem.title||''}" placeholder="Safety Inspector"/></div>
          <div class="form-group full"><div class="form-label">Email address<span>*</span></div><input id="f_email" type="email" value="${editItem.email||''}" placeholder="mtorres@ucsc.edu"/></div>
          <div class="form-group full"><div class="form-label">Phone number</div><input id="f_phone" value="${editItem.phone||''}" placeholder="(831) 459-0000"/></div>
        </div>
        <div class="section-divider">Role</div>
        <div class="role-picker">
          <div class="role-card insp ${role==='insp'?'selected':''}" onclick="editItem.role='insp';renderModal()">
            <div class="role-card-title"><i class="ti ti-user-check" style="color:var(--ok)"></i> Inspector</div>
            <div class="role-card-desc">Can log inspections and view assigned sites. Cannot add or edit equipment or accounts.</div>
          </div>
          <div class="role-card coord ${role==='coord'?'selected':''}" onclick="editItem.role='coord';renderModal()">
            <div class="role-card-title"><i class="ti ti-shield-check" style="color:var(--navy)"></i> Coordinator</div>
            <div class="role-card-desc">Full access — can manage all equipment, sites, accounts, and view all inspection history.</div>
          </div>
        </div>
        <div class="section-divider">Site access</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">
          ${role==='coord' ? 'Coordinators have access to all sites automatically.' : 'Select which sites this inspector can access.'}
        </div>
        ${role==='coord'
          ? `<div class="uc-sites">${SITES.map(s=>`<span class="site-chip">${s}</span>`).join('')}</div>`
          : `<div class="sites-checklist">${SITES.map(s=>`
              <div class="site-check-row" onclick="toggleSite('${s}')">
                <input type="checkbox" ${selectedSites.includes(s)?'checked':''} onclick="event.stopPropagation();toggleSite('${s}')"/>
                <span>${s}</span>
              </div>`).join('')}</div>`}
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveAccount()">${isEdit?'Save changes':'Send invite'}</button>
      </div>
    </div>
  </div>`;
}

document.addEventListener("DOMContentLoaded", renderMain);
</script>

<script src="nav.js"></script>
</body>
</html>
