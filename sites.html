<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyTrack — Sites</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.site-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.search-row{display:flex;align-items:center;gap:6px;border:0.5px solid var(--border-strong);border-radius:8px;padding:7px 10px;background:var(--surface-2);flex:1;min-width:160px;max-width:280px}
.search-row i{color:var(--text-muted);font-size:14px}
.search-row input{border:none;outline:none;font-size:13px;background:transparent;width:100%}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-left:auto;white-space:nowrap}
.add-btn:hover{background:var(--navy-dark)}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
@media (max-width:700px){.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
.stat{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-lbl{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:var(--navy)}
.stat-val.ok{color:var(--ok)}
.stat-val.bad{color:var(--bad)}

.site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.site-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:16px}
.site-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.site-icon{width:38px;height:38px;border-radius:10px;background:#E8EFF6;color:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.site-name{font-size:14px;font-weight:600}
.site-address{font-size:11px;color:var(--text-secondary)}
.site-meta{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--text-secondary);margin-bottom:10px}
.site-meta div{display:flex;align-items:center;gap:6px}
.site-compliance{margin-bottom:10px}
.bar-track{height:6px;border-radius:4px;background:var(--surface-1);overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary)}
.site-actions{display:flex;gap:6px;border-top:0.5px solid var(--border);padding-top:10px}
.btn-sm{flex:1;text-align:center;padding:6px 8px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary)}
.btn-sm:hover{background:var(--surface-1)}
.btn-sm.danger:hover{color:var(--bad);border-color:var(--bad)}
.empty-state{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:32px;margin-bottom:8px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface-2);border-radius:14px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:0.5px solid var(--border)}
.modal-head-icon{width:32px;height:32px;border-radius:8px;background:#E8EFF6;color:var(--navy);display:flex;align-items:center;justify-content:center}
.modal-title{font-size:15px;font-weight:600;color:var(--navy);flex:1}
.modal-close{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted)}
.modal-close:hover{background:var(--surface-1)}
.modal-body{padding:16px 18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:500;color:var(--text-secondary)}
.form-label span{color:var(--bad);margin-left:2px}
.form-group input{padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:6px;font-size:13px;outline:none}
.form-group input:focus{border-color:var(--navy)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:0.5px solid var(--border)}
.btn-cancel{padding:8px 16px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface-2);font-size:13px;font-weight:500;cursor:pointer;color:var(--text-secondary)}
.btn-save{padding:8px 16px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-save:hover{background:var(--navy-dark)}
.btn-danger-confirm{padding:8px 16px;border-radius:8px;border:none;background:var(--bad);color:#fff;font-size:13px;font-weight:500;cursor:pointer}
</style>
</head>
<body>

<div id="page-content">
  <div id="siteRoot"></div>
</div>

<script>
let sites = [
  { id:1, name:"McHenry Library", address:"1156 High St, Santa Cruz, CA", contact:"Maria Torres", contactEmail:"mtorres@ucsc.edu", equipmentCount:26, compliant:22 },
  { id:2, name:"Kresge Town Hall", address:"1131 High St, Santa Cruz, CA", contact:"David Kim", contactEmail:"dkim@ucsc.edu", equipmentCount:15, compliant:14 },
  { id:3, name:"Science Hill Bldg 3", address:"1156 High St, Santa Cruz, CA", contact:"Maria Torres", contactEmail:"mtorres@ucsc.edu", equipmentCount:24, compliant:19 },
  { id:4, name:"Porter College", address:"1111 High St, Santa Cruz, CA", contact:"David Kim", contactEmail:"dkim@ucsc.edu", equipmentCount:33, compliant:31 },
  { id:5, name:"Cowell College", address:"1156 High St, Santa Cruz, CA", contact:"Maria Torres", contactEmail:"mtorres@ucsc.edu", equipmentCount:28, compliant:27 },
  { id:6, name:"Crown College", address:"1201 High St, Santa Cruz, CA", contact:"David Kim", contactEmail:"dkim@ucsc.edu", equipmentCount:19, compliant:16 },
  { id:7, name:"Baskin Engineering", address:"1156 High St, Santa Cruz, CA", contact:"Maria Torres", contactEmail:"mtorres@ucsc.edu", equipmentCount:29, compliant:18 },
  { id:8, name:"Communications Building", address:"1156 High St, Santa Cruz, CA", contact:"David Kim", contactEmail:"dkim@ucsc.edu", equipmentCount:12, compliant:11 },
];

let searchTerm = "";
let modalMode = null; // null | 'add' | 'edit' | 'delete'
let editItem = {};
let deleteTarget = null;

function barColor(pct){
  if(pct>=90) return "#2E7D32";
  if(pct>=75) return "#B45309";
  return "#B91C1C";
}
function stats(){
  const totalEquip = sites.reduce((s,r)=>s+r.equipmentCount,0);
  const totalCompliant = sites.reduce((s,r)=>s+r.compliant,0);
  return {
    totalSites: sites.length,
    totalEquip,
    avgCompliance: totalEquip ? Math.round(totalCompliant/totalEquip*100) : 0,
    lowest: sites.reduce((min,s)=> (s.compliant/s.equipmentCount) < (min.compliant/min.equipmentCount) ? s : min, sites[0]),
  };
}
function filteredRows(){
  if(!searchTerm.trim()) return sites;
  const t = searchTerm.toLowerCase();
  return sites.filter(s => s.name.toLowerCase().includes(t) || s.address.toLowerCase().includes(t) || s.contact.toLowerCase().includes(t));
}

function renderMain(){
  const s = stats();
  const rows = filteredRows();

  document.getElementById("siteRoot").innerHTML = `
    <div class="site-toolbar">
      <div class="search-row">
        <i class="ti ti-search"></i>
        <input placeholder="Search sites, address, or contact" value="${searchTerm}" oninput="searchTerm=this.value;renderMain()"/>
      </div>
      <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> Add site</button>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">Total sites</div><div class="stat-val">${s.totalSites}</div></div>
      <div class="stat"><div class="stat-lbl">Total equipment</div><div class="stat-val">${s.totalEquip}</div></div>
      <div class="stat"><div class="stat-lbl">Avg. compliance</div><div class="stat-val ok">${s.avgCompliance}%</div></div>
      <div class="stat"><div class="stat-lbl">Needs attention</div><div class="stat-val bad" style="font-size:14px;line-height:22px">${s.lowest.name}</div></div>
    </div>

    <div class="site-grid">
      ${rows.length===0 ? `<div class="empty-state"><i class="ti ti-building-off"></i><p>No sites match this search.</p></div>` :
      rows.map(site=>{
        const pct = Math.round(site.compliant/site.equipmentCount*100);
        return `
        <div class="site-card">
          <div class="site-top">
            <div style="display:flex;gap:10px">
              <div class="site-icon"><i class="ti ti-building"></i></div>
              <div>
                <div class="site-name">${site.name}</div>
                <div class="site-address">${site.address}</div>
              </div>
            </div>
          </div>
          <div class="site-meta">
            <div><i class="ti ti-user"></i>${site.contact}</div>
            <div><i class="ti ti-mail"></i>${site.contactEmail}</div>
            <div><i class="ti ti-fire-extinguisher"></i>${site.equipmentCount} pieces of equipment</div>
          </div>
          <div class="site-compliance">
            <div class="bar-label"><span>Compliance</span><span>${pct}%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>
          </div>
          <div class="site-actions">
            <div class="btn-sm" onclick="openEdit(${site.id})"><i class="ti ti-edit"></i> Edit</div>
            <div class="btn-sm danger" onclick="confirmDelete(${site.id})"><i class="ti ti-trash"></i> Remove</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div id="modalView"></div>
  `;
  renderModal();
}

function openAdd(){
  editItem = { id:null, name:"", address:"", contact:"", contactEmail:"", equipmentCount:0, compliant:0 };
  modalMode = "add";
  renderMain();
}
function openEdit(id){
  editItem = { ...sites.find(s=>s.id===id) };
  modalMode = "edit";
  renderMain();
}
function confirmDelete(id){
  deleteTarget = id;
  modalMode = "delete";
  renderMain();
}
function closeModal(){
  modalMode = null;
  deleteTarget = null;
  renderMain();
}
function doDelete(){
  sites = sites.filter(s=>s.id!==deleteTarget);
  modalMode = null;
  deleteTarget = null;
  renderMain();
}
function saveSite(){
  const name = document.getElementById("f_name").value.trim();
  if(!name){ alert("Site name is required."); return; }
  const address = document.getElementById("f_address").value.trim();
  const contact = document.getElementById("f_contact").value.trim();
  const contactEmail = document.getElementById("f_email").value.trim();

  if(modalMode==="edit"){
    const s = sites.find(x=>x.id===editItem.id);
    Object.assign(s, { name, address, contact, contactEmail });
  } else {
    sites.push({
      id: Math.max(0,...sites.map(s=>s.id))+1,
      name, address, contact, contactEmail,
      equipmentCount:0, compliant:0,
    });
  }
  modalMode = null;
  renderMain();
}

function renderModal(){
  const mv = document.getElementById("modalView");
  if(!mv) return;
  if(!modalMode){ mv.innerHTML = ""; return; }

  if(modalMode==="delete"){
    const site = sites.find(s=>s.id===deleteTarget);
    mv.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:380px">
        <div class="modal-head">
          <div class="modal-head-icon" style="background:var(--bad-bg);color:var(--bad)"><i class="ti ti-trash"></i></div>
          <div class="modal-title">Remove site</div>
          <div class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></div>
        </div>
        <div class="modal-body">
          <p style="font-size:13px;color:var(--text-secondary)">Remove <strong>${site.name}</strong>? This site has ${site.equipmentCount} pieces of equipment linked to it — removing the site does not delete that equipment, but it will need to be reassigned to another site.</p>
        </div>
        <div class="modal-foot">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-danger-confirm" onclick="doDelete()">Remove site</button>
        </div>
      </div>
    </div>`;
    return;
  }

  const isEdit = modalMode==="edit";
  mv.innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-head-icon"><i class="ti ti-building"></i></div>
        <div class="modal-title">${isEdit?'Edit site':'Add new site'}</div>
        <div class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></div>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group full"><div class="form-label">Site name<span>*</span></div><input id="f_name" value="${editItem.name||''}" placeholder="McHenry Library"/></div>
          <div class="form-group full"><div class="form-label">Address</div><input id="f_address" value="${editItem.address||''}" placeholder="1156 High St, Santa Cruz, CA"/></div>
          <div class="form-group"><div class="form-label">Primary contact</div><input id="f_contact" value="${editItem.contact||''}" placeholder="Maria Torres"/></div>
          <div class="form-group"><div class="form-label">Contact email</div><input id="f_email" value="${editItem.contactEmail||''}" placeholder="mtorres@ucsc.edu"/></div>
        </div>
        ${isEdit ? `<p style="font-size:11px;color:var(--text-muted);margin-top:12px">Equipment count and compliance rate are calculated automatically from the Equipment and Inspections screens — they can't be edited directly here.</p>` : ''}
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveSite()">${isEdit?'Save changes':'Add site'}</button>
      </div>
    </div>
  </div>`;
}

document.addEventListener("DOMContentLoaded", renderMain);
</script>

<script src="nav.js"></script>
</body>
</html>
